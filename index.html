<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cinema Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #placeholder { 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            font-family: Arial;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="placeholder">No video loaded. Paste a URL in Cinema Player.</div>
    <iframe id="player" style="display:none" allow="autoplay; fullscreen"></iframe>

    <script>
        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        const videoUrl = getParam("url");
        if (videoUrl) {
            document.getElementById("placeholder").style.display = "none";
            const player = document.getElementById("player");
            player.style.display = "block";
            player.src = videoUrl + (videoUrl.includes('?') ? '&' : '?') + 'autoplay=0';
        }
    </script>
</body>
</html>
