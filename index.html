<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cinema Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        #player { width: 100%; height: 100%; border: none; }
        #placeholder { 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            font-family: Arial;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="placeholder">No video loaded.</div>
    <iframe id="player" style="display:none" 
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation">
    </iframe>

    <script>
        function getParam(name) {
            return new URL(window.location.href).searchParams.get(name);
        }

<script>
    function getParam(name) {
        return new URL(window.location.href).searchParams.get(name);
    }

    const videoUrl = getParam("url");
    if (videoUrl) {
        document.getElementById("placeholder").style.display = "none";
        const isYouTube = videoUrl.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
        
        if (isYouTube) {
            const player = document.getElementById("player");
            player.style.display = "block";
            player.src = `https://www.youtube.com/embed/${isYouTube[1]}?autoplay=1`;
        } else {
            document.getElementById("player").style.display = "none";
            const video = document.createElement("video");
            video.src = videoUrl;
            video.style = "width:100%;height:100%;";
            video.autoplay = true;
            video.controls = true;
            document.body.appendChild(video);
        }
    }
</script>

</body>
</html>
